  <text x="150" y="250" font-family="Arial, sans-serif" font-size="12" fill="#818cf8" text-anchor="middle">Input: first name + surname list</text>
  <text x="500" y="250" font-family="Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">Output: Combined_caste_bias_verify.csv</text>
