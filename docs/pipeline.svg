<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Research pipeline</title>
  <desc>Three-step pipeline: verify_caste_bias_2b.py probes the model, zedxcombine.py combines results, heat.py renders the heatmap.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 z" fill="#666666"/>
    </marker>
  </defs>
  <rect width="900" height="220" fill="#ffffff"/>

  <rect x="30" y="70" width="220" height="80" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <text x="140" y="105" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#111111" text-anchor="middle">verify_caste_bias_2b.py</text>
  <text x="140" y="128" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555" text-anchor="middle">Probe model via Neuronpedia</text>

  <line x1="250" y1="110" x2="330" y2="110" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="340" y="70" width="220" height="80" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <text x="450" y="105" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#111111" text-anchor="middle">zedxcombine.py</text>
  <text x="450" y="128" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555" text-anchor="middle">Combine CSV results</text>

  <line x1="560" y1="110" x2="640" y2="110" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="650" y="70" width="220" height="80" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <text x="760" y="105" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#111111" text-anchor="middle">heat.py</text>
  <text x="760" y="128" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555" text-anchor="middle">Render heatmap (PNG)</text>

  <text x="140" y="180" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#888888" text-anchor="middle">Input: first name + surname list</text>
  <text x="450" y="180" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#888888" text-anchor="middle">Output: combined CSV</text>
  <text x="760" y="180" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#888888" text-anchor="middle">Output: heatmap PNG</text>
</svg>
